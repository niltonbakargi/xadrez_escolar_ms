version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xadrez_escolar
      POSTGRES_USER: ${POSTGRES_USER:-xadrez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xadrez123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../stockfish:/app/stockfish

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    command: celery -A app.worker worker --loglevel=info
    env_file:
      - ../backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app
      - ../stockfish:/app/stockfish

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
